<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការសន្ទនាសម្ភាសន៍ការងារ (Job Interview Conversation)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Khmer', sans-serif;
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .conversation-container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 140px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .modal-bg {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-3 md:p-6 lg:p-8">

<div class="conversation-container glass-panel rounded-3xl lg:rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-4 md:p-8 lg:p-12 border border-white">
    
    <!-- Top Header & Controls -->
    <header class="text-center mb-10 lg:mb-16 pb-8 border-b border-slate-200/80 relative">
        <div class="inline-flex items-center bg-indigo-50 text-indigo-600 px-5 py-2 rounded-full text-sm font-bold mb-5 border border-indigo-100 shadow-sm transition-transform hover:scale-105">
            <i class="fas fa-briefcase mr-2"></i> មេរៀនសន្ទនា
        </div>
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-slate-800 mb-4 tracking-tight leading-snug">ការសន្ទនាសម្ភាសន៍ការងារ</h1>
        <h2 class="text-base md:text-xl text-slate-500 font-medium mb-8 tracking-wide">(Job Interview Conversation)</h2>
        
        <div class="flex flex-wrap justify-center gap-3 md:gap-5">
            <button onclick="openModal(-1)" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-6 md:px-8 py-3 rounded-2xl shadow-lg shadow-emerald-500/30 flex items-center gap-2 text-sm md:text-base font-bold transition-all transform hover:-translate-y-1">
                <i class="fas fa-plus-circle text-lg md:text-xl"></i> បន្ថែមប្រយោគថ្មី
            </button>
            <button onclick="resetToDefault()" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-6 md:px-8 py-3 rounded-2xl shadow-sm flex items-center gap-2 text-sm md:text-base font-bold transition-all hover:border-slate-300 transform hover:-translate-y-1">
                <i class="fas fa-history text-lg"></i> ត្រឡប់ទៅទិន្នន័យដើម
            </button>
            <button onclick="openSettingsModal()" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-4 md:px-5 py-3 rounded-2xl shadow-sm flex items-center gap-2 text-sm md:text-base font-bold transition-all hover:border-slate-300 transform hover:-translate-y-1" title="ការកំណត់ API Key">
                <i class="fas fa-cog text-lg"></i> <span class="hidden md:inline">ការកំណត់</span>
            </button>
        </div>
    </header>

    <!-- Timeline / Conversation Grid -->
    <div id="conversation-list" class="flex flex-col gap-6 md:gap-8 lg:gap-10 relative z-0 w-full mx-auto">
        <!-- Glowing Center Line (Desktop Only) -->
        <div class="hidden lg:block absolute left-1/2 top-4 bottom-4 w-1 bg-gradient-to-b from-blue-400 via-indigo-400 to-emerald-400 shadow-[0_0_15px_rgba(99,102,241,0.6)] -translate-x-1/2 z-0 rounded-full opacity-90"></div>
        <!-- កាតនឹងត្រូវបង្កើតនៅទីនេះដោយ JavaScript -->
    </div>
</div>

<!-- Floating Action Buttons (Bottom Right) -->
<div class="fixed bottom-6 right-6 md:bottom-10 md:right-10 flex flex-col gap-4 z-40 items-end">
    <button id="slowModeToggleBtn" onclick="toggleSlowMode()" class="bg-white text-indigo-600 border border-indigo-100 shadow-[0_8px_25px_rgba(0,0,0,0.1)] rounded-full w-14 h-14 md:w-auto md:h-auto md:px-6 md:py-3.5 flex items-center justify-center gap-3 hover:bg-indigo-50 transition-all transform hover:scale-105">
        <i class="fas fa-snail text-2xl md:text-xl"></i>
        <span class="hidden md:inline font-bold text-base" id="slowModeText">ល្បឿនធម្មតា</span>
    </button>
    <button id="playAllBtn" onclick="togglePlayAll()" class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white shadow-[0_10px_30px_rgba(79,70,229,0.35)] rounded-full w-16 h-16 md:w-auto md:h-auto md:px-8 md:py-4.5 flex items-center justify-center gap-3 hover:from-indigo-700 hover:to-blue-700 transition-all transform hover:scale-105 border border-indigo-400/30">
        <i class="fas fa-play text-2xl ml-1 md:ml-0"></i>
        <span class="hidden md:inline font-extrabold text-lg tracking-wide" id="playAllText">ស្តាប់ពីដើមដល់ចប់</span>
    </button>
</div>

<!-- Edit/Add Modal -->
<div id="editModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden transform scale-95 transition-transform duration-300 border border-slate-100" id="modalContent">
        <div class="bg-slate-50/80 border-b border-slate-200 px-6 py-5 flex justify-between items-center backdrop-blur-sm">
            <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2" id="modalTitle">
                <i class="fas fa-edit text-indigo-500"></i> កែប្រែប្រយោគ
            </h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 transition-colors bg-white hover:bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="p-6 space-y-5">
            <input type="hidden" id="editIndex" value="-1">
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">អ្នកនិយាយ</label>
                <select id="inputSpeaker" class="w-full border border-slate-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium text-slate-700 bg-slate-50 transition-colors cursor-pointer">
                    <option value="boss">老板 (ថៅកែ)</option>
                    <option value="applicant">面试员 (បេក្ខជន)</option>
                </select>
            </div>

            <!-- Auto Translate Section -->
            <div class="bg-indigo-50/60 border border-indigo-100 rounded-2xl p-4 space-y-3">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-xs text-indigo-700 font-bold uppercase tracking-wider flex items-center gap-1.5"><i class="fas fa-magic"></i> បកប្រែស្វ័យប្រវត្តិដោយ AI</p>
                    <span id="autoTranslateStatus" class="text-xs font-bold flex items-center gap-1"></span>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="autoFill('kh')" class="flex-1 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm flex justify-center items-center gap-2">
                        <i class="fas fa-language"></i> ខ្មែរ <i class="fas fa-arrow-right text-[10px] text-indigo-400"></i> ចិន
                    </button>
                    <button onclick="autoFill('zh')" class="flex-1 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm flex justify-center items-center gap-2">
                        <i class="fas fa-language"></i> ចិន <i class="fas fa-arrow-right text-[10px] text-indigo-400"></i> ខ្មែរ
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ភាសាខ្មែរ (Khmer)</label>
                <textarea id="inputKhmer" rows="2" class="w-full border border-slate-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-base placeholder-slate-400 transition-colors"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">អក្សរចិន (Chinese)</label>
                <textarea id="inputChinese" rows="2" class="w-full border border-slate-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-lg placeholder-slate-400 transition-colors"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ភីនអ៊ីន (Pinyin)</label>
                <input type="text" id="inputPinyin" class="w-full border border-slate-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm placeholder-slate-400 transition-colors">
            </div>

        </div>
        
        <div class="bg-slate-50/80 border-t border-slate-200 px-6 py-5 flex justify-end gap-4 rounded-b-3xl backdrop-blur-sm">
            <button onclick="closeModal()" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-100 px-6 py-2.5 rounded-xl font-bold transition-colors shadow-sm text-base">បោះបង់</button>
            <button onclick="saveModal()" class="bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white px-8 py-2.5 rounded-xl font-bold transition-colors flex items-center gap-2 shadow-lg shadow-indigo-500/30 text-base" id="saveBtn">
                <i class="fas fa-save"></i> រក្សាទុក
            </button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 modal-bg hidden z-[60] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300 border border-slate-100" id="settingsModalContent">
        <div class="bg-slate-50/80 border-b border-slate-200 px-6 py-5 flex justify-between items-center backdrop-blur-sm">
            <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                <i class="fas fa-cog text-slate-500"></i> ការកំណត់ (Settings)
            </h3>
            <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-700 transition-colors bg-white hover:bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Gemini API Key របស់អ្នក</label>
                <input type="password" id="inputApiKey" placeholder="បិទភ្ជាប់ API Key នៅទីនេះ..." class="w-full border border-slate-300 rounded-xl shadow-sm p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm placeholder-slate-400 transition-colors">
                <p class="text-xs text-slate-500 mt-3 leading-relaxed">
                    * ពេល Host លើ GitHub អ្នកត្រូវប្រើ API Key ផ្ទាល់ខ្លួនដើម្បីទាញសំឡេង និងបកប្រែ។ <br>
                    អ្នកអាចបង្កើតវាបានដោយឥតគិតថ្លៃនៅ <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-600 underline font-bold hover:text-indigo-800">Google AI Studio</a>។
                </p>
            </div>
        </div>
        
        <div class="bg-slate-50/80 border-t border-slate-200 px-6 py-5 flex justify-end gap-3 rounded-b-3xl backdrop-blur-sm">
            <button onclick="closeSettingsModal()" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-100 px-5 py-2 rounded-xl font-bold transition-colors shadow-sm text-sm">បោះបង់</button>
            <button onclick="saveApiKey()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-xl font-bold transition-colors flex items-center gap-2 shadow-md text-sm">
                <i class="fas fa-save"></i> រក្សាទុក
            </button>
        </div>
    </div>
</div>

<script>
    // --- Data & Settings Management ---
    const STORAGE_KEY = 'jobInterviewConversationData_v8';
    const API_STORAGE_KEY = 'custom_gemini_api_key';

    const defaultConversationData = [
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你好，请坐。", pinyin: "Nǐ hǎo, qǐng zuò.", khmer: "សួស្តី សូមអង្គុយ។" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "谢谢老板。", pinyin: "Xièxiè lǎobǎn.", khmer: "អរគុណថៅកែ។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你自己介绍一下", pinyin: "Nǐ zìjǐ jièshào yīxià", khmer: "សូមណែនាំខ្លួនអ្នកបន្តិចមើល។" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "你好！我叫达罗， 今年我26岁了", pinyin: "Nǐ hǎo! Wǒ jiào Dáluó, jīnnián wǒ 26 suì le", khmer: "សួស្តី! ខ្ញុំឈ្មោះ ដារ៉ូ ឆ្នាំនេះខ្ញុំអាយុ 26 ឆ្នាំហើយ។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你家在哪儿？", pinyin: "Nǐ jiā zài nǎ'er?", khmer: "តើផ្ទះអ្នកនៅឯណា?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "我家在1号路，靠近哥罗戈市场", pinyin: "Wǒ jiā zài 1 hào lù, kàojìn Gēluógē shìchǎng", khmer: "ផ្ទះខ្ញុំនៅផ្លូវជាតិលេខ1 នៅជិតផ្សារ \"ក្រោលគោ\"" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "那！你以前做什么工作？", pinyin: "Nà! Nǐ yǐqián zuò shénme gōngzuò?", khmer: "ចុះ! ពីមុនអ្នកធ្វើការងារអ្វីដែរ?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "我以前当会计文员的。", pinyin: "Wǒ yǐqián dāng kuàijì wényuán de.", khmer: "ពីមុនខ្ញុំធ្វើជាបុគ្គលិកគណនេយ្យ។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你为什么辞去以前的工作？", pinyin: "Nǐ wèishéme cíqù yǐqián de gōngzuò?", khmer: "ហេតុអ្វីបានជាអ្នកឈប់ពីការងារចាស់?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "因为我想找一个更好的发展机会。", pinyin: "Yīnwèi wǒ xiǎng zhǎo yīgè gèng hǎo de fāzhǎn jīhuì.", khmer: "ពីព្រោះខ្ញុំចង់ស្វែងរកឱកាសអភិវឌ្ឍន៍ដែលល្អជាងមុន។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你结婚了吗？", pinyin: "Nǐ jiéhūnle ma?", khmer: "តើអ្នករៀបការហើយឬនៅ?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "我单身的", pinyin: "Wǒ dānshēn de", khmer: "ខ្ញុំនៅលីវទេ។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你家有几口人？", pinyin: "Nǐ jiā yǒu jǐ kǒu rén?", khmer: "តើគ្រួសារអ្នកមានសមាជិកប៉ុន្មាននាក់?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "我家有5口人的。", pinyin: "Wǒjiā yǒu 5 kǒu rén de.", khmer: "គ្រួសារខ្ញុំមានសមាជិក ៥ នាក់។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "从你家到工厂远不远", pinyin: "Cóng nǐ jiā dào gōngchǎng yuǎn bù yuǎn", khmer: "ពីផ្ទះអ្នកមកដល់រោងចក្រ ឆ្ងាយឬអត់?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "不远的， 从工厂到我家8分钟", pinyin: "Bù yuǎn de, cóng gōngchǎng dào wǒjiā 8 fēnzhōng", khmer: "មិនឆ្ងាយទេ ពីរោងចក្រទៅផ្ទះខ្ញុំចំណាយពេល 8 នាទី។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "你中文有水平， 你懂电脑吗？", pinyin: "Nǐ zhōngwén yǒu shuǐpíng, nǐ dǒng diànnǎo ma?", khmer: "ភាសាចិនរបស់អ្នកល្អគួរសម តើអ្នកចេះកុំព្យូទ័រទេ?" },
        { role: "面试员 (បេក្ខជន)", speaker: "applicant", chinese: "我电脑可以用的。", pinyin: "Wǒ diànnǎo kěyǐ yòng de.", khmer: "ខ្ញុំអាចប្រើកុំព្យូទ័របាន។" },
        { role: "老板 (ថៅកែ)", speaker: "boss", chinese: "很好。你会用Excel吗？", pinyin: "Hěn hǎo. Nǐ huì yòng Excel ma?", khmer: "ល្អណាស់។ តើអ្នកចេះប្រើ Excel ទេ?" },

    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
        return bytes.buffer;
    }

    function pcmToWav(pcmData, sampleRate) {
        const numChannels = 1;
        const bitsPerSample = 16;
        const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
        const blockAlign = numChannels * (bitsPerSample / 8);
        const dataSize = pcmData.length * (bitsPerSample / 8);
        const chunkSize = 36 + dataSize;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); }
        }

        writeString(view, 0, 'RIFF'); view.setUint32(4, chunkSize, true); writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitsPerSample, true); writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        const dataView = new Int16Array(buffer, 44);
        for (let i = 0; i < pcmData.length; i++) { dataView[i] = pcmData[i]; }
        return new Blob([buffer], { type: 'audio/wav' });
    }

    async function generateTTSAudioUrl(text, speaker) {
        // Retrieve custom key if available, otherwise defaults to ""
        const userApiKey = localStorage.getItem(API_STORAGE_KEY) || "";
        const apiKey = userApiKey || ""; 
        const voiceName = speaker === 'boss' ? 'Orus' : 'Fenrir'; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const promptText = `Speak this Chinese text clearly and naturally: ${text}`;

        const payload = {
            contents: [{ parts: [{ text: promptText }] }],
            generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
            },
            model: "gemini-2.5-flash-preview-tts"
        };

        const delays = [1000, 2000, 4000, 8000];
        let result = null;
        let lastError = null;

        for (let i = 0; i < 4; i++) {
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    if(response.status === 403 || response.status === 400) {
                        throw new Error("API_KEY_ERROR");
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const json = await response.json();
                if (json?.candidates?.[0]?.content?.parts?.some(p => p.inlineData && p.inlineData.data)) {
                    result = json; break;
                } else {
                    throw new Error("Invalid response format");
                }
            } catch (error) {
                lastError = error;
                // If it's an API Key error, do not retry
                if(error.message === "API_KEY_ERROR") break;
                if (i < 3) await new Promise(r => setTimeout(r, delays[i]));
            }
        }

        if (!result) throw lastError || new Error("Failed to generate audio.");

        const part = result.candidates[0].content.parts.find(p => p.inlineData && p.inlineData.data);
        const mimeType = part.inlineData.mimeType || "audio/L16;rate=24000";
        const sampleRateMatch = mimeType.match(/rate=(\d+)/);
        const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000; 
        
        const pcmBuffer = base64ToArrayBuffer(part.inlineData.data);
        const wavBlob = pcmToWav(new Int16Array(pcmBuffer), sampleRate);
        return URL.createObjectURL(wavBlob);
    }

    function getAudioUrl(index) {
        const item = conversationData[index];
        if (item.cachedAudioUrl) return Promise.resolve(item.cachedAudioUrl);
        
        if (!item.audioPromise) {
            item.audioPromise = generateTTSAudioUrl(item.chinese, item.speaker).then(url => {
                item.cachedAudioUrl = url;
                return url;
            }).catch(err => {
                item.audioPromise = null;
                throw err;
            });
        }
        return item.audioPromise;
    }

    async function preloadAudioInBackground() {
        for (let i = 0; i < conversationData.length; i++) {
            try {
                await getAudioUrl(i);
                await new Promise(r => setTimeout(r, 600)); 
            } catch (e) {
                console.warn(`Preloading failed for item ${i}`);
                if (e.message === "API_KEY_ERROR") {
                    break; // Stop preloading if API key is invalid to save requests
                }
            }
        }
    }

    async function playConversationItem(index) {
        const item = conversationData[index];
        const msgBubble = document.getElementById(`msg-${index}`);
        const playBtn = document.getElementById(`play-btn-${index}`);
        if(!playBtn) return false;
        
        const iconElement = playBtn.querySelector('i');
        const textElement = playBtn.querySelector('span');
        const originalIconClass = 'fas fa-play';

        if (globalAudio) {
            globalAudio.pause();
            globalAudio.currentTime = 0;
        }

        document.querySelectorAll('.message-card').forEach(el => {
            el.classList.remove('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl');
        });
        
        msgBubble.classList.add('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl');
        msgBubble.scrollIntoView({ behavior: 'smooth', block: 'center' });

        iconElement.className = 'fas fa-spinner fa-spin';
        if(textElement) textElement.innerText = "កំពុងទាញយក...";

        try {
            const audioUrl = await getAudioUrl(index);
            if (shouldStopAll && isPlayingAll) return false;

            return new Promise((resolve) => {
                globalAudio = new Audio(audioUrl);
                globalAudio.playbackRate = isSlowMode ? 0.75 : 1.0;
                iconElement.className = 'fas fa-volume-up text-indigo-600 animate-pulse';
                if(textElement) textElement.innerText = "កំពុងអាន...";

                globalAudio.onended = () => {
                    iconElement.className = originalIconClass;
                    if(textElement) textElement.innerText = "ស្តាប់";
                    msgBubble.classList.remove('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl');
                    resolve(true);
                };
                globalAudio.onerror = () => {
                    iconElement.className = originalIconClass;
                    if(textElement) textElement.innerText = "ស្តាប់";
                    msgBubble.classList.remove('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl');
                    resolve(false);
                };
                globalAudio.play().catch(e => resolve(false));
            });
        } catch (error) {
            iconElement.className = originalIconClass;
            if(textElement) textElement.innerText = "ស្តាប់";
            msgBubble.classList.remove('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl');
            
            if (error.message === "API_KEY_ERROR") {
                if(!isPlayingAll) showToast("បញ្ហា API Key!<br><span class='text-sm font-normal'>សូមបញ្ចូល Gemini API Key របស់អ្នកនៅក្នុងការកំណត់ ⚙️ ដើម្បីដំណើរការលើ GitHub។</span>", "error");
            } else {
                if(!isPlayingAll) showToast("សុំទោស មានបញ្ហាក្នុងការទាញយកសំឡេង សូមព្យាយាមម្តងទៀត។", "error");
            }
            return false;
        }
    }

    async function handleManualPlay(index) {
        if (isPlayingAll) stopPlayAll();
        await playConversationItem(index);
    }

    async function startPlayAll() {
        isPlayingAll = true; shouldStopAll = false;
        const btn = document.getElementById('playAllBtn');
        btn.classList.replace('from-indigo-600', 'from-red-500');
        btn.classList.replace('to-blue-600', 'to-red-600');
        btn.classList.replace('hover:from-indigo-700', 'hover:from-red-600');
        btn.classList.replace('hover:to-blue-700', 'hover:to-red-700');
        btn.classList.replace('border-indigo-400/30', 'border-red-500/30');
        btn.innerHTML = `<i class="fas fa-stop text-xl md:text-2xl"></i> <span class="hidden md:inline font-extrabold text-base md:text-lg tracking-wide" id="playAllText">បញ្ឈប់ការស្តាប់</span>`;

        for (let i = 0; i < conversationData.length; i++) {
            if (shouldStopAll) break;
            const success = await playConversationItem(i);
            // ប្រសិនបើ Error ដោយសារ API_KEY ឈប់លេងទាំងអស់តែម្តង
            if (success === false && !shouldStopAll) {
                break;
            }
            if (shouldStopAll) break;
            await new Promise(res => setTimeout(res, 800));
        }
        stopPlayAll();
    }

    function stopPlayAll() {
        isPlayingAll = false; shouldStopAll = true;
        if (globalAudio) globalAudio.pause();
        
        document.querySelectorAll('.message-card').forEach(el => el.classList.remove('ring-4', 'ring-indigo-400/50', 'scale-[1.02]', 'z-20', 'shadow-2xl'));

        const btn = document.getElementById('playAllBtn');
        btn.classList.replace('from-red-500', 'from-indigo-600');
        btn.classList.replace('to-red-600', 'to-blue-600');

        btn.classList.replace('hover:to-red-700', 'hover:to-blue-700');
        btn.classList.replace('border-red-500/30', 'border-indigo-400/30');

    }

        if(statusSpan) statusSpan.innerHTML = ''; 
        
        if(index === -1) {
            title.innerHTML = '<i class="fas fa-plus-circle text-emerald-500"></i> បន្ថែមប្រយោគថ្មី';
            document.getElementById('inputSpeaker').value = 'boss';
            document.getElementById('inputKhmer').value = '';
            document.getElementById('inputChinese').value = '';
            document.getElementById('inputPinyin').value = '';
        } else {
            title.innerHTML = '<i class="fas fa-edit text-indigo-500"></i> កែប្រែប្រយោគ';
            const item = conversationData[index];
            document.getElementById('inputSpeaker').value = item.speaker;
            document.getElementById('inputKhmer').value = item.khmer;
            document.getElementById('inputChinese').value = item.chinese;
            document.getElementById('inputPinyin').value = item.pinyin;
        }

        modal.classList.remove('hidden');
        void modal.offsetWidth; 
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
    }

    function closeModal() {
        const modal = document.getElementById('editModal');
        const content = document.getElementById('modalContent');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    function saveModal() {
        const index = parseInt(document.getElementById('editIndex').value);
        const speaker = document.getElementById('inputSpeaker').value;
        const khmer = document.getElementById('inputKhmer').value.trim();
        const chinese = document.getElementById('inputChinese').value.trim();
        const pinyin = document.getElementById('inputPinyin').value.trim();

        if(!khmer || !chinese || !pinyin) {
            alert("សូមបំពេញចន្លោះទាំងអស់ (ខ្មែរ, ចិន, Pinyin) ឬប្រើប៊ូតុងបកប្រែស្វ័យប្រវត្តិ។");
            return;
        }

        const newItem = {
            role: speaker === 'boss' ? "老板 (ថៅកែ)" : "面试员 (បេក្ខជន)",
            speaker: speaker,
            chinese: chinese,
            pinyin: pinyin,
            khmer: khmer
        };

        if(index === -1) {
            conversationData.push(newItem);
            showToast("បានបន្ថែមប្រយោគថ្មីជោគជ័យ!", "success");
        } else {
            if(conversationData[index].chinese === chinese && conversationData[index].speaker === speaker) {
                newItem.cachedAudioUrl = conversationData[index].cachedAudioUrl;
            }
            conversationData[index] = newItem;
            showToast("បានកែប្រែជោគជ័យ!", "success");
        }

        saveData();
        renderConversation();
        closeModal();
    }

    function deleteItem(index) {
        if(confirm("តើអ្នកពិតជាចង់លុបប្រយោគនេះមែនទេ?")) {
            conversationData.splice(index, 1);
            saveData();
            renderConversation();
            showToast("បានលុបជោគជ័យ!", "info");
        }
    }

    async function autoFill(sourceLang, isAutoTyping = false) {
        const khInput = document.getElementById('inputKhmer');
        const zhInput = document.getElementById('inputChinese');
        const pyInput = document.getElementById('inputPinyin');
        const statusSpan = document.getElementById('autoTranslateStatus');
        const btnKh = document.querySelector(`button[onclick="autoFill('kh')"]`);
        const btnZh = document.querySelector(`button[onclick="autoFill('zh')"]`);

        let textToTranslate = "";
        
        if(sourceLang === 'kh') {
            textToTranslate = khInput.value.trim();
            if(!textToTranslate) {
                if(!isAutoTyping) alert("សូមវាយអក្សរខ្មែរជាមុនសិន!");
                return;
            }
            if(!isAutoTyping) btnKh.innerHTML = '<i class="fas fa-spinner fa-spin"></i> កំពុងបកប្រែ...';
        } else {
            textToTranslate = zhInput.value.trim();
            if(!textToTranslate) {
                if(!isAutoTyping) alert("សូមវាយអក្សរចិនជាមុនសិន!");
                return;
            }
            if(!isAutoTyping) btnZh.innerHTML = '<i class="fas fa-spinner fa-spin"></i> កំពុងបកប្រែ...';
        }

        if(statusSpan) statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin text-indigo-500"></i> <span class="text-indigo-600">កំពុងបកប្រែ...</span>';

        const userApiKey = localStorage.getItem(API_STORAGE_KEY) || "";
        const apiKey = userApiKey || ""; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        let prompt = `You are a helpful translation assistant. `;
        if (sourceLang === 'zh') {
            prompt += `Translate this Chinese text to natural conversational Khmer and provide accurate Pinyin. Text: "${textToTranslate}"`;
        } else {
            prompt += `Translate this conversational Khmer text to natural Simplified Chinese and provide accurate Pinyin. Text: "${textToTranslate}"`;
        }

        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        chinese: { type: "STRING" },
                        pinyin: { type: "STRING" },
                        khmer: { type: "STRING" }
                    },
                    required: ["chinese", "pinyin", "khmer"]
                }
            }
        };

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(!response.ok) {
                if(response.status === 403 || response.status === 400) {
                    throw new Error("API_KEY_ERROR");
                }
                throw new Error("API Error");
            }
            
            const result = await response.json();
            const jsonText = result.candidates[0].content.parts[0].text;
            const parsed = JSON.parse(jsonText);

            if(sourceLang === 'kh') {
                zhInput.value = parsed.chinese;
                pyInput.value = parsed.pinyin;
            } else {
                khInput.value = parsed.khmer;
                pyInput.value = parsed.pinyin;
            }
            
            if(statusSpan) statusSpan.innerHTML = '<i class="fas fa-check-circle text-emerald-500"></i> <span class="text-emerald-600">រួចរាល់</span>';
            if(!isAutoTyping) showToast("ការបកប្រែទទួលបានជោគជ័យ", "success");

        } catch(e) {
            console.error(e);
            if(statusSpan) statusSpan.innerHTML = '<i class="fas fa-exclamation-triangle text-red-500"></i> <span class="text-red-500">បរាជ័យ</span>';
            
            if(e.message === "API_KEY_ERROR") {
                if(!isAutoTyping) showToast("បញ្ហា API Key! សូមបញ្ចូល API Key របស់អ្នកនៅក្នុងការកំណត់ ⚙️", "error");
            } else {
                if(!isAutoTyping) alert("សូមអភ័យទោស មានបញ្ហាក្នុងការបកប្រែ សូមព្យាយាមម្តងទៀត។");
            }
        } finally {
            if(!isAutoTyping) {
                btnKh.innerHTML = '<i class="fas fa-language"></i> ខ្មែរ <i class="fas fa-arrow-right text-[10px] text-indigo-400"></i> ចិន';
                btnZh.innerHTML = '<i class="fas fa-language"></i> ចិន <i class="fas fa-arrow-right text-[10px] text-indigo-400"></i> ខ្មែរ';
            }
        }
    }

    // --- Render Perfect Timeline Desktop View ---
    function renderConversation() {
        const listContainer = document.getElementById('conversation-list');
        listContainer.innerHTML = ''; 

        conversationData.forEach((item, index) => {
            const isBoss = item.speaker === 'boss';
            
            // Design Layout Variables
            const rowAlignmentClass = isBoss ? 'justify-start' : 'justify-end';
            const cardPaddingClass = isBoss ? 'lg:pr-12' : 'lg:pl-12';
            const dotPosition = isBoss ? 'bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.9)]' : 'bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.9)]';
            
            // UI Color Variables
            const cardBgClass = isBoss ? 'bg-white border border-blue-100' : 'bg-white border border-emerald-100';
            const headerBgClass = isBoss ? 'bg-gradient-to-r from-blue-50/60 to-transparent' : 'bg-gradient-to-l from-emerald-50/60 to-transparent';
            const headerBorderClass = isBoss ? 'border-blue-100' : 'border-emerald-100';
            const avatarGradient = isBoss ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-emerald-500 to-teal-500';
            const iconClass = isBoss ? 'fa-user-tie' : 'fa-user';
            const roleColor = isBoss ? 'text-blue-700' : 'text-emerald-700';
            const playBtnClass = isBoss ? 'bg-white border-blue-200 text-blue-600 hover:bg-blue-50 hover:border-blue-300' : 'bg-white border-emerald-200 text-emerald-600 hover:bg-emerald-50 hover:border-emerald-300';

            const messageHTML = `
                <!-- 100% Width Row Container -->
                <div class="w-full flex ${rowAlignmentClass} relative group">
                    
                    <!-- Center Timeline Dot (Desktop only) -->
                    <!-- Absolute position centers it on the line perfectly! -->
                    <div class="hidden lg:block absolute left-1/2 top-8 w-4 h-4 rounded-full border-[3px] border-white ${dotPosition} -translate-x-1/2 z-20 transition-transform duration-300 group-hover:scale-[1.6]"></div>

                    <!-- Card Wrapper (Takes exact 50% width on Desktop) -->
                    <div class="w-full md:w-[90%] lg:w-1/2 flex ${cardPaddingClass} ${isBoss ? 'lg:justify-end' : 'lg:justify-start'}">
                        
                        <!-- The Actual Message Card -->
                        <div id="msg-${index}" class="message-card w-full ${cardBgClass} shadow-[0_4px_25px_rgba(0,0,0,0.03)] hover:shadow-[0_8px_35px_rgba(0,0,0,0.08)] rounded-[1.5rem] md:rounded-[2rem] overflow-hidden transition-all duration-300 relative z-10">
                            
                            <!-- Header Area -->
                            <div class="flex justify-between items-center px-4 md:px-6 py-3 border-b ${headerBorderClass} ${headerBgClass}">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full ${avatarGradient} flex items-center justify-center text-white shadow-md border-[2px] border-white flex-shrink-0 transform transition-transform group-hover:rotate-12">
                                        <i class="fas ${iconClass} text-sm"></i>
                                    </div>
                                    <span class="font-bold ${roleColor} text-sm md:text-base tracking-wide uppercase">${item.role}</span>
                                </div>
                                
                                <div class="flex items-center gap-2">
                                    <div class="flex lg:opacity-0 lg:group-hover:opacity-100 gap-1 md:mr-2 transition-opacity duration-300">
                                        <button onclick="openModal(${index})" class="text-slate-400 hover:text-indigo-600 bg-white p-2 rounded-xl shadow-sm border border-slate-100 transition-all hover:scale-110" title="កែប្រែ">
                                            <i class="fas fa-pen text-xs"></i>
                                        </button>
                                        <button onclick="deleteItem(${index})" class="text-slate-400 hover:text-red-500 bg-white p-2 rounded-xl shadow-sm border border-slate-100 transition-all hover:scale-110" title="លុប">
                                            <i class="fas fa-trash text-xs"></i>
                                        </button>
                                    </div>
                                    <button 
                                        id="play-btn-${index}"
                                        onclick="handleManualPlay(${index})" 
                                        class="flex items-center gap-2 px-4 py-2 rounded-full text-xs md:text-sm font-bold transition-all duration-300 border shadow-sm hover:shadow-md transform hover:-translate-y-0.5 ${playBtnClass}"
                                    >
                                        <i class="fas fa-play"></i> <span class="hidden sm:inline">ស្តាប់</span>
                                    </button>
                                </div>
                            </div>

                            <!-- Text Content Area -->
                            <div class="p-5 md:p-6 space-y-4">
                                <div>
                                    <p class="text-[1.1rem] md:text-[1.2rem] font-bold text-slate-800 leading-snug">${item.khmer}</p>
                                </div>
                                
                                <div class="w-full h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent my-2 opacity-60"></div>
                                
                                <div>
                                    <p class="text-[1.2rem] md:text-[1.35rem] font-medium text-slate-700 leading-snug tracking-wide font-sans">${item.chinese}</p>
                                </div>
                                
                                <div class="pt-2">
                                    <span class="inline-block bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-xs md:text-[15px] text-slate-500 font-mono shadow-sm tracking-widest font-medium">
                                        ${item.pinyin}
                                    </span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            `;
            listContainer.insertAdjacentHTML('beforeend', messageHTML);
        });
        
        if(conversationData.length === 0) {
            listContainer.innerHTML = `
                <div class="text-center py-20 px-4">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-slate-100 text-slate-300 mb-6 shadow-inner">
                        <i class="fas fa-comment-slash text-5xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-700 mb-3">មិនមានទិន្នន័យទេ</h3>
                    <p class="text-slate-500 mb-6 text-lg">សូមចុចប៊ូតុង "បន្ថែមប្រយោគថ្មី" ដើម្បីចាប់ផ្តើម ឬ "ត្រឡប់ទៅទិន្នន័យដើម"។</p>
                </div>
            `;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        renderConversation();

        setTimeout(() => { preloadAudioInBackground(); }, 1000);

        let typingTimer;
        const doneTypingInterval = 1000; 
        
        const inputKh = document.getElementById('inputKhmer');
        const inputZh = document.getElementById('inputChinese');
        const inputPy = document.getElementById('inputPinyin');
        const statusSpan = document.getElementById('autoTranslateStatus');

        inputKh.addEventListener('input', () => {
            clearTimeout(typingTimer);
            const text = inputKh.value.trim();
            if (text) {
                statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin text-indigo-400"></i> <span class="text-indigo-500">កំពុងរង់ចាំ...</span>';
                typingTimer = setTimeout(() => { autoFill('kh', true); }, doneTypingInterval);
            } else {
                inputZh.value = ''; inputPy.value = ''; statusSpan.innerHTML = '';
            }
        });

        inputZh.addEventListener('input', () => {
            clearTimeout(typingTimer);
            const text = inputZh.value.trim();
            if (text) {
                statusSpan.innerHTML = '<i class="fas fa-spinner fa-spin text-indigo-400"></i> <span class="text-indigo-500">កំពុងរង់ចាំ...</span>';
                typingTimer = setTimeout(() => { autoFill('zh', true); }, doneTypingInterval);
            } else {
                inputKh.value = ''; inputPy.value = ''; statusSpan.innerHTML = '';
            }
        });
    });

</script>
</body>
